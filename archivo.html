<style>
        :root {
            --bg: #f4f7fa;
            --text: #000000;
            --accent: #8a2be2; /* Violeta para Archivo */
            --sidebar-w: 220px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        #canvas-archive {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transform: translateX(-195px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar:hover { transform: translateX(0); }
        .phi-logo { width: 22px; opacity: 0.7; margin-bottom: 1rem; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 1.2rem; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        .container {
            position: relative;
            z-index: 10;
            padding: 5rem 5% 5rem 100px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 { 
            font-weight: 800; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            letter-spacing: -0.05em; 
            margin-bottom: 3rem;
        }

        .ig-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }

        .ig-thumb {
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            cursor: pointer;
            background: #e0e4e8;
            border-radius: 8px;
        }

        .ig-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            filter: grayscale(10%) contrast(1.05);
            transition: filter 0.4s, transform 0.4s;
        }

        .ig-thumb:hover img {
            filter: grayscale(0%) contrast(1);
            transform: scale(1.05);
        }

        .ig-thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .ig-thumb:hover .ig-thumb-overlay { background: rgba(0,0,0,0.4); }

        .ig-thumb-overlay span {
            color: #fff;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0;
            font-weight: 700;
        }

        .ig-thumb:hover .ig-thumb-overlay span { opacity: 1; }

        .ig-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .ig-modal.open { display: flex; }

        .ig-modal-inner {
            background: #161616;
            border: 1px solid #333;
            max-width: 900px;
            width: 100%;
            display: flex;
            max-height: 85vh;
            overflow: hidden;
            position: relative;
            border-radius: 8px;
        }

        .ig-modal-img {
            flex: 1.5;
            min-width: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ig-modal-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .ig-modal-info {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            overflow-y: auto;
            background: #161616;
        }

        .ig-modal-body { padding: 24px; flex: 1; }

        .ig-modal-date {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .ig-modal-caption {
            font-size: 0.95rem;
            color: #d1d1d1;
            line-height: 1.6;
            font-weight: 500;
        }

        .ig-modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.6;
        }

        .ig-modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            font-size: 24px;
            width: 44px;
            height: 70px;
            cursor: pointer;
            z-index: 1001;
        }
        .ig-modal-prev { left: 0; border-radius: 0 6px 6px 0; }
        .ig-modal-next { right: 300px; border-radius: 6px 0 0 6px; }

        @media (max-width: 800px) {
            .container { padding: 5rem 5% 5rem 60px; }
            .ig-modal-inner { flex-direction: column; }
            .ig-modal-info { width: 100%; border-left: none; border-top: 1px solid #333; max-height: 200px; }
            .ig-modal-next { right: 0; }
        }
    </style>
</head>

<script>
        const fotos = [
            { src: 'fotospagpro/20260407_172236.jpg', date: '7 de abril, 2026', caption: 'Mi manada' },
            { src: 'fotospagpro/20260324_075041.jpg', date: '18 de marzo, 2026', caption: 'Primer día del Intership de Banxico' },
            { src: 'fotospagpro/photo_5165901615146404809_y.jpg', date: '27 de febrero, 2026', caption: 'Última foto como Secretario de Academia en la IV Asamblea Nacional ANEE' },
            { src: 'fotospagpro/grafica_banxico_final.png', date: '20 de diciembre, 2025', caption: 'Gráficas chulas hechas en python' },
            { src: 'fotospagpro/gear.jpg', date: '2 de diciembre, 2025', caption: 'Chambas del semestre' },
            { src: 'fotospagpro/gayglenweaias5m.jpg', date: '25 de octubre, 2025', caption: 'Última Conferencia Coordinada como representante de la ANEE en la Facultad de Economía UNAM' },
            { src: 'fotospagpro/20250408_094308.jpg', date: '4 de agosto, 2025', caption: 'Ciclo de Conferencias del INEGI' },
            { src: 'fotospagpro/sne-10.jpg', date: '31 de mayo, 2025', caption: 'XII Simposio Nacional' },
            { src: 'fotospagpro/gzza4ltasaaiaqw.jpg', date: '8 de octubre, 2024', caption: 'Presentación de "Así no es" en El Colegio de México' },
            { src: 'fotospagpro/img_9026.jpg', date: '6 de mayo, 2024', caption: 'Primer Evento Organizado como repre de la ANEE' }
        ];

        let current = 0;
        function openModal(index) {
            current = index; render();
            document.getElementById('igModal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function render() {
            const f = fotos[current];
            document.getElementById('modalImg').src = f.src;
            document.getElementById('modalDate').textContent = f.date;
            document.getElementById('modalCaption').textContent = f.caption;
        }
        function navigate(dir) {
            current = (current + dir + fotos.length) % fotos.length; render();
        }
        function closeModal() {
            document.getElementById('igModal').classList.remove('open');
            document.body.style.overflow = '';
        }

        /* --- SCRIPT RANDOM WALK VIOLETA --- */
        (function(){
            const canvas = document.getElementById('canvas-archive');
            const ctx = canvas.getContext('2d');
            let width, height;
            
            class ArchiveWalk {
                constructor() {
                    this.x = 0; this.y = 0;
                    this.trail = [];
                    this.maxTrail = 4000;
                    this.stepSize = 5;
                    this.color = [138, 43, 226]; 
                }
                init(w, h) {
                    this.x = w * 0.8; this.y = h * 0.5;
                    this.trail = [{x: this.x, y: this.y, jump: false}];
                    for(let i=0; i<1500; i++) this.updateInternal(w, h);
                }
                updateInternal(w, h) {
                    const angle = Math.random() * Math.PI * 2;
                    let nextX = this.x + Math.cos(angle) * this.stepSize;
                    let nextY = this.y + Math.sin(angle) * this.stepSize;
                    let jump = false;
                    if (nextX < 0) { nextX = w; jump = true; }
                    else if (nextX > w) { nextX = 0; jump = true; }
                    if (nextY < 0) { nextY = h; jump = true; }
                    else if (nextY > h) { nextY = 0; jump = true; }
                    this.x = nextX; this.y = nextY;
                    this.trail.push({x: this.x, y: this.y, jump: jump});
                    if(this.trail.length > this.maxTrail) this.trail.shift();
                }
                update(w, h) { for(let i=0; i<15; i++) this.updateInternal(w, h); }
                draw(ctx, w, h) {
                    ctx.fillStyle = '#f4f7fa';
                    ctx.fillRect(0, 0, w, h);
                    if(this.trail.length < 2) return;
                    ctx.beginPath();
                    ctx.lineWidth = 1.3;
                    ctx.strokeStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0.22)`;
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for(let i=1; i<this.trail.length; i++) {
                        const p = this.trail[i];
                        if (p.jump) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                    ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
                }
            }

            const walker = new ArchiveWalk();
            function handleResize() {
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width; canvas.height = height;
                walker.init(width, height);
            }
            function loop() {
                walker.update(width, height);
                walker.draw(ctx, width, height);
                requestAnimationFrame(loop);
            }
            window.addEventListener('resize', handleResize);
            handleResize();
            loop();
        })();
    </script>
