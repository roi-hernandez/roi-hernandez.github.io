<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Rodrigo Hernández-Cervantes</title>
<link rel="icon" type="image/png" href="phi.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7fa;
            --text: #000000;
            --accent: #e67e22; /* Naranja/Terracota para Contacto */
            --sidebar-w: 220px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- FONDO DINÁMICO --- */
        #canvas-contact {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: var(--sidebar-w);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0,0,0,0.05);
            z-index: 100;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            transform: translateX(-195px);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .sidebar:hover { transform: translateX(0); }
        .phi-logo { width: 22px; opacity: 0.7; margin-bottom: 1rem; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 1.2rem; }
        .nav-links a { text-decoration: none; color: var(--text); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
        .nav-links a:hover { color: var(--accent); }

        /* --- LAYOUT ALINEADO A LA IZQUIERDA --- */
        .container {
            position: relative;
            z-index: 10;
            padding: 5rem 10% 5rem 100px; /* Margen para sidebar */
            max-width: 1200px;
            margin: 0 auto;
            text-align: left; /* Todo alineado a la izquierda */
        }

        h1 { 
            font-weight: 800; 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            letter-spacing: -0.05em; 
            margin-bottom: 5rem;
        }

        .contact-methods-wrapper {
            max-width: 600px;
        }

        .contact-method {
            margin-bottom: 2.5rem;
        }

        .label {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 0.8rem;
            display: block;
        }

        .contact-link {
            font-size: 1rem; /* Reducido para mejor estética */
            font-weight: 600;
            color: #1a1a1a;
            text-decoration: none;
            transition: color 0.3s;
            word-break: break-all;
        }

        .contact-link:hover {
            color: var(--accent);
        }

        .note {
            font-style: italic;
            color: #888;
            font-size: 0.85rem;
            margin-top: 5rem;
            display: block;
        }

        @media (max-width: 768px) {
            .container { padding: 5rem 5% 5rem 60px; }
            h1 { margin-bottom: 3rem; }
        }
    </style>
</head>
<body>

    <canvas id="canvas-contact"></canvas>

    <nav class="sidebar">
        <img src="phi.png" alt="Phi" class="phi-logo">
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="bio.html">Bio</a></li>
            <li><a href="publicaciones.html">Publicaciones</a></li>
            <li><a href="agora.html">Ágora Social</a></li>
            <li><a href="proyectos.html">Proyectos</a></li>
            <li><a href="contacto.html" style="color: var(--accent);">Contacto</a></li>
            <li><a href="archivo.html">Archivo</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Contacto</h1>

        <div class="contact-methods-wrapper">
            <!-- CORREO INSTITUCIONAL -->
            <div class="contact-method">
                <span class="label">Correo Institucional</span>
                <a href="mailto:rhcervantes@comunidad.unam.mx" class="contact-link">rhcervantes@comunidad.unam.mx</a>
            </div>

            <!-- CORREO PERSONAL -->
            <div class="contact-method">
                <span class="label">Correo Personal</span>
                <a href="mailto:rohrc14@gmail.com" class="contact-link">rohrc14@gmail.com</a>
            </div>

            <!-- TELÉFONO -->
            <div class="contact-method">
                <span class="label">Teléfono</span>
                <a href="tel:+5665128395" class="contact-link">+56 65 12 83 95</a>
            </div>

            <p class="note">Abierto a colaboraciones y chambas.</p>
        </div>
    </div>

    <script>
        (function(){
            const canvas = document.getElementById('canvas-contact');
            const ctx = canvas.getContext('2d');
            let width, height;
            
            class ContactWalk {
                constructor() {
                    this.x = 0; this.y = 0;
                    this.trail = [];
                    this.maxTrail = 4000;
                    this.stepSize = 5;
                    this.color = [230, 126, 34]; // Naranja #e67e22
                }
                init(w, h) {
                    this.x = w * 0.2; this.y = h * 0.8;
                    this.trail = [{x: this.x, y: this.y, jump: false}];
                    for(let i=0; i<1500; i++) this.updateInternal(w, h);
                }
                updateInternal(w, h) {
                    const angle = Math.random() * Math.PI * 2;
                    let nextX = this.x + Math.cos(angle) * this.stepSize;
                    let nextY = this.y + Math.sin(angle) * this.stepSize;
                    let jump = false;
                    if (nextX < 0) { nextX = w; jump = true; }
                    else if (nextX > w) { nextX = 0; jump = true; }
                    if (nextY < 0) { nextY = h; jump = true; }
                    else if (nextY > h) { nextY = 0; jump = true; }
                    this.x = nextX; this.y = nextY;
                    this.trail.push({x: this.x, y: this.y, jump: jump});
                    if(this.trail.length > this.maxTrail) this.trail.shift();
                }
                update(w, h) { for(let i=0; i<15; i++) this.updateInternal(w, h); }
                draw(ctx, w, h) {
                    ctx.fillStyle = '#f4f7fa';
                    ctx.fillRect(0, 0, w, h);
                    if(this.trail.length < 2) return;
                    ctx.beginPath();
                    ctx.lineWidth = 1.3;
                    ctx.strokeStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0.2)`;
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for(let i=1; i<this.trail.length; i++) {
                        const p = this.trail[i];
                        if (p.jump) ctx.moveTo(p.x, p.y);
                        else ctx.lineTo(p.x, p.y);
                    }
                    ctx.stroke();
                    ctx.fillStyle = `rgb(${this.color[0]}, ${this.color[1]}, ${this.color[2]})`;
                    ctx.beginPath(); ctx.arc(this.x, this.y, 2.5, 0, Math.PI*2); ctx.fill();
                }
            }

            const walker = new ContactWalk();
            function handleResize() {
                width = window.innerWidth; height = window.innerHeight;
                canvas.width = width; canvas.height = height;
                walker.init(width, height);
            }
            function loop() {
                walker.update(width, height);
                walker.draw(ctx, width, height);
                requestAnimationFrame(loop);
            }
            window.addEventListener('resize', handleResize);
            handleResize();
            loop();
        })();
    </script>
</body>
</html>
